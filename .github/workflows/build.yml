name: Build and Release Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Web App
        run: |
          cd frontend
          npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android Build
        run: |
          cd frontend
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

  build-desktop:
    name: Build Desktop (Win/Mac)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Desktop App
        run: |
          cd frontend
          npm run build
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run electron:build:win
          else
            npm run electron:build:mac
          fi
        shell: bash

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-build-${{ matrix.os }}
          path: |
            frontend/release/*.exe
            frontend/release/*.dmg
            frontend/release/*.zip

  build-ios:
    name: Build iOS (iPhone)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Web App
        run: |
          cd frontend
          npm run build

      - name: Capacitor Sync
        run: |
          cd frontend
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd frontend/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Debug CODE_SIGNING_ALLOWED=NO | xcpretty

  release:
    name: Create GitHub Release
    needs: [build-android, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p release_files
          find artifacts -type f -name "*.apk" -exec cp {} release_files/ \;
          find artifacts -type f -name "*.exe" -exec cp {} release_files/ \;
          find artifacts -type f -name "*.dmg" -exec cp {} release_files/ \;
          find artifacts -type f -name "*.zip" -exec cp {} release_files/ \;
          echo "Release Files:"
          ls -R release_files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build v${{ github.run_number }} - $(date +'%Y-%m-%d %H:%M')"
          files: release_files/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
